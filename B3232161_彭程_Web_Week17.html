<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>B3232161_彭程_Web_Week17</title>
    <link rel="stylesheet" type="text/css" href="css/stylesheet.css" />
</head>

<body>
    <div id="container">
        <h1>個人通訊錄</h1>

        <div id="topBtn">
            <button type="button" id="clearDatabtn">清空資料</button>
            <button type="button" id="dropDBbtn">刪除資料庫</button>
        </div>

        <div id="toolBtn">
            <button type="button" id="newbtn" class="sprite sprite-add" title="新增會員"></button>
            <button type="button" id="searchDatabtn" class="sprite sprite-search" title="搜尋"></button>
        </div>

        <h3 id="showJob">新增資料</h3>
        <p id="msg">顯示訊息</p>

        <form id="contactsform">
            <input type="hidden" id="IDkey" />

            <p class="doubleLine">
                <label for="name">姓名：</label>
                <input type="text" id="name" />

                <label for="tel" class="telLabel">電話：</label>
                <input type="text" id="tel" />
            </p>

            <p>
                <label for="address">地址：</label>
                <input type="text" id="address" />
            </p>

            <p>
                <label for="email">Mail：</label>
                <input type="text" id="email" />
            </p>

            <p>
                <label for="memo">備註：</label>
                <input type="text" id="memo" />
            </p>

            <p id="findDate">
                <label for="startDate">建立日期：</label>
                <input type="date" id="startDate" />
                <span>~</span>
                <input type="date" id="endDate" />
            </p>

            <p id="buttonBar">
                <button type="button" id="addbtn">新增OK</button>
                <button type="button" id="putbtn">修改OK</button>
                <button type="button" id="findbtn">送出搜尋</button>
            </p>
        </form>

        <table id="listTb"></table>
    </div>

    <script src="js/site.js"></script>
</body>
</html>
