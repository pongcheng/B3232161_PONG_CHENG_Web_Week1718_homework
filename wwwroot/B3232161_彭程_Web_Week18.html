<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>B3232161_彭程_Web_Week18</title>
    <meta name="theme-color" content="#212529" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="moneybook-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <style>
        body {
            min-height: 100vh;
            background: #eef1f4;
            color: #202428;
            font-family: Arial, "Microsoft JhengHei", sans-serif;
        }

        .navbar {
            box-shadow: 0 2px 8px rgba(0, 0, 0, .18);
        }

        .app-shell {
            max-width: 960px;
            padding: 22px 14px 92px;
        }

        .summary-group {
            width: 100%;
        }

        .summary-group .btn {
            min-height: 76px;
            cursor: default;
        }

        .summary-title {
            display: block;
            font-size: 15px;
        }

        .summary-money {
            display: block;
            margin-top: 4px;
            font-size: 22px;
            font-weight: 700;
        }

        .records-area {
            min-height: 380px;
            padding-top: 16px;
        }

        .record-card {
            overflow: hidden;
            border: 0;
            border-radius: 7px;
            box-shadow: 0 2px 12px rgba(21, 27, 34, .12);
        }

        .record-date {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #d8dde2;
            color: #3a3f44;
            font-size: 14px;
        }

        .record-body {
            display: grid;
            grid-template-columns: 38px minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 14px 12px;
            background: #fff;
        }

        .record-icon {
            display: inline-flex;
            width: 28px;
            height: 28px;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #fff;
        }

        .record-icon.income {
            background: #198754;
        }

        .record-icon.pay {
            background: #dc3545;
        }

        .record-memo {
            margin: 0;
            font-weight: 700;
            word-break: break-word;
        }

        .record-kind {
            margin-left: 10px;
            color: #59616a;
            font-size: 13px;
        }

        .record-money {
            min-width: 86px;
            text-align: right;
            font-weight: 700;
        }

        .record-money.income {
            color: #198754;
        }

        .record-money.pay {
            color: #dc3545;
        }

        .empty-state {
            display: flex;
            min-height: 260px;
            align-items: center;
            justify-content: center;
            color: #68717a;
        }

        .fab {
            position: fixed;
            right: 28px;
            bottom: 28px;
            z-index: 10;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(13, 110, 253, .34);
            font-size: 30px;
            line-height: 1;
        }

        .form-label {
            font-weight: 700;
        }

        @media (max-width: 576px) {
            .summary-group {
                display: grid;
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .summary-group .btn {
                width: 100%;
                border-radius: 7px !important;
            }

            .record-body {
                grid-template-columns: 32px minmax(0, 1fr);
            }

            .record-money {
                grid-column: 2;
                min-width: 0;
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" class="d-none">
        <symbol id="icon-coin" viewBox="0 0 16 16">
            <path d="M5.5 9.511c.076.954.83 1.697 2.182 1.785V12h.6v-.709c1.4-.098 2.218-.846 2.218-1.932 0-.987-.626-1.496-1.745-1.76l-.473-.112V5.57c.6.068.982.396 1.074.85h1.052c-.076-.919-.864-1.638-2.126-1.716V4h-.6v.719c-1.195.117-2.01.836-2.01 1.853 0 .9.606 1.472 1.613 1.707l.397.098v2.034c-.615-.093-1.022-.43-1.114-.9zm2.177-2.166c-.59-.137-.91-.416-.91-.836 0-.47.345-.822.915-.925v1.76h-.005zm.692 1.193c.717.166 1.048.435 1.048.91 0 .542-.412.914-1.135.982V8.518z" />
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16" />
            <path d="M8 13.5a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11m0 .5A6 6 0 1 0 8 2a6 6 0 0 0 0 12" />
        </symbol>
        <symbol id="icon-card" viewBox="0 0 16 16">
            <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v1H0V4zm0 3h16v5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V7zm3 2a1 1 0 0 0 0 2h2a1 1 0 0 0 0-2H3z" />
        </symbol>
    </svg>

    <nav class="navbar navbar-expand navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">我的記帳本</a>
            <div class="dropstart">
                <button class="btn btn-secondary btn-sm dropdown-toggle" type="button" id="monthButton" data-bs-toggle="dropdown" aria-expanded="false">
                    全部
                </button>
                <ul class="dropdown-menu" id="selectMonth" aria-labelledby="monthButton"></ul>
            </div>
        </div>
    </nav>

    <main class="container app-shell">
        <div class="btn-group summary-group" role="group" aria-label="金額統計">
            <button type="button" class="btn btn-outline-secondary">
                <span class="summary-title">收入</span>
                <span class="summary-money" id="incomeTotal">0</span>
            </button>
            <button type="button" class="btn btn-outline-secondary">
                <span class="summary-title">支出</span>
                <span class="summary-money" id="payTotal">0</span>
            </button>
            <button type="button" class="btn btn-outline-secondary">
                <span class="summary-title">結餘</span>
                <span class="summary-money" id="balanceTotal">0</span>
            </button>
        </div>

        <section class="records-area" id="recordsArea"></section>
    </main>

    <button type="button" class="btn btn-primary fab" title="新增收支" data-bs-toggle="modal" data-bs-target="#accountModal">+</button>

    <div class="modal fade" id="accountModal" tabindex="-1" aria-labelledby="accountModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="accountForm">
                    <div class="modal-header">
                        <select name="addKind" id="addKind" class="form-select w-auto">
                            <option value="pay" selected>支出</option>
                            <option value="income">收入</option>
                        </select>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label" for="date">日期</label>
                            <input type="date" class="form-control" id="date" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label" for="money">金額</label>
                            <input type="number" class="form-control" id="money" min="1" step="1" required />
                        </div>
                        <div>
                            <label class="form-label" for="memo">備註</label>
                            <input type="text" class="form-control" id="memo" maxlength="40" required />
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
                        <button type="submit" class="btn btn-primary">儲存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="lib/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const dbName = "moneybook";
        const storeName = "account";
        const dbVersion = 1;

        let db = null;
        let selectedMonth = 0;

        const incomeTotal = document.getElementById("incomeTotal");
        const payTotal = document.getElementById("payTotal");
        const balanceTotal = document.getElementById("balanceTotal");
        const recordsArea = document.getElementById("recordsArea");
        const selectMonth = document.getElementById("selectMonth");
        const monthButton = document.getElementById("monthButton");
        const accountForm = document.getElementById("accountForm");
        const accountModal = new bootstrap.Modal(document.getElementById("accountModal"));

        document.getElementById("date").value = getTodayString();

        for (let i = 1; i <= 12; i++) {
            selectMonth.innerHTML += `<li><a class="dropdown-item" href="#" data-key="${i}">${i}月</a></li>`;
        }
        selectMonth.innerHTML += `<li><hr class="dropdown-divider"></li><li><a class="dropdown-item" href="#" data-key="0">全部</a></li>`;

        selectMonth.addEventListener("click", function (event) {
            const item = event.target.closest(".dropdown-item");

            if (item === null) {
                return;
            }

            event.preventDefault();
            selectedMonth = Number(item.dataset.key);
            monthButton.textContent = selectedMonth === 0 ? "全部" : selectedMonth + "月";
            getAllData();
        });

        accountForm.addEventListener("submit", function (event) {
            event.preventDefault();
            addData();
        });

        recordsArea.addEventListener("click", function (event) {
            const button = event.target.closest(".delete-btn");

            if (button === null) {
                return;
            }

            const id = Number(button.dataset.id);
            if (confirm("確定要刪除這筆收支嗎？")) {
                deleteData(id);
            }
        });

        const openRequest = indexedDB.open(dbName, dbVersion);

        openRequest.onupgradeneeded = function (event) {
            const thisDB = event.target.result;
            const store = thisDB.createObjectStore(storeName, {
                keyPath: "id",
                autoIncrement: true
            });

            store.createIndex("addKind", "addKind", { unique: false });
            store.createIndex("date", "date", { unique: false });
            store.createIndex("money", "money", { unique: false });
            store.createIndex("memo", "memo", { unique: false });
            store.createIndex("timestamp", "timestamp", { unique: false });
        };

        openRequest.onsuccess = function (event) {
            db = event.target.result;
            getAllData();
        };

        openRequest.onerror = function () {
            recordsArea.innerHTML = `<div class="empty-state">IndexedDB 開啟失敗</div>`;
        };

        function addData() {
            const addKind = document.getElementById("addKind").value;
            const date = document.getElementById("date").value;
            const money = Number(document.getElementById("money").value);
            const memo = document.getElementById("memo").value.trim();

            if (date === "" || money <= 0 || memo === "") {
                return;
            }

            const tx = db.transaction(storeName, "readwrite");
            const store = tx.objectStore(storeName);

            store.add({
                addKind,
                date,
                money,
                memo,
                timestamp: new Date()
            });

            tx.oncomplete = function () {
                accountForm.reset();
                document.getElementById("addKind").value = "pay";
                document.getElementById("date").value = getTodayString();
                accountModal.hide();
                getAllData();
            };
        }

        function deleteData(id) {
            const tx = db.transaction(storeName, "readwrite");
            const store = tx.objectStore(storeName);

            store.delete(id);

            tx.oncomplete = function () {
                getAllData();
            };
        }

        function getAllData() {
            if (db === null) {
                return;
            }

            if (selectedMonth === 0) {
                getAllRecords();
            } else {
                searchByMonth(selectedMonth);
            }
        }

        function getAllRecords() {
            const tx = db.transaction(storeName, "readonly");
            const store = tx.objectStore(storeName);
            const request = store.getAll();

            request.onsuccess = function (event) {
                showDataList(sortRecords(event.target.result));
            };
        }

        function searchByMonth(month) {
            const tx = db.transaction(storeName, "readonly");
            const store = tx.objectStore(storeName);
            const index = store.index("date");
            const request = index.openCursor();
            const cursorJson = [];
            const keyword = "-" + String(month).padStart(2, "0") + "-";

            request.onsuccess = function (event) {
                const cursor = event.target.result;

                if (cursor) {
                    if (cursor.value.date.indexOf(keyword) !== -1) {
                        cursorJson.push(cursor.value);
                    }

                    cursor.continue();
                } else {
                    showDataList(sortRecords(cursorJson));
                }
            };
        }

        function showDataList(records) {
            renderSummary(records);
            renderRecords(records);
        }

        function sortRecords(records) {
            return records.sort(function (a, b) {
                return new Date(b.date) - new Date(a.date) || b.id - a.id;
            });
        }

        function renderSummary(records) {
            const income = records
                .filter((item) => item.addKind === "income")
                .reduce((sum, item) => sum + Number(item.money), 0);
            const pay = records
                .filter((item) => item.addKind === "pay")
                .reduce((sum, item) => sum + Number(item.money), 0);

            incomeTotal.textContent = formatMoney(income);
            payTotal.textContent = formatMoney(pay);
            balanceTotal.textContent = formatMoney(income - pay);
        }

        function renderRecords(records) {
            if (records.length === 0) {
                recordsArea.innerHTML = `<div class="empty-state">沒有交易</div>`;
                return;
            }

            recordsArea.innerHTML = records.map(function (item) {
                const kindText = item.addKind === "income" ? "收入" : "支出";
                const moneyClass = item.addKind === "income" ? "income" : "pay";
                const symbol = item.addKind === "income" ? "+" : "-";

                return `
                    <article class="record-card mb-3">
                        <div class="record-date">
                            <span>${escapeHtml(item.date)}</span>
                            <span>${kindText}
                                <button type="button" class="btn-close delete-btn ms-2" data-id="${item.id}" aria-label="刪除"></button>
                            </span>
                        </div>
                        <div class="record-body">
                            <span class="record-icon ${moneyClass}">
                                <svg width="16" height="16" fill="currentColor" aria-hidden="true">
                                    <use href="#${item.addKind === "income" ? "icon-coin" : "icon-card"}"></use>
                                </svg>
                            </span>
                            <p class="record-memo">${escapeHtml(item.memo)}<span class="record-kind">${kindText}</span></p>
                            <span class="record-money ${moneyClass}">${symbol}${formatMoney(item.money)}</span>
                        </div>
                    </article>
                `;
            }).join("");
        }

        function formatMoney(value) {
            return Number(value).toLocaleString("zh-TW");
        }

        function getTodayString() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");

            return `${year}-${month}-${day}`;
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("sw.js");
            });
        }
    </script>
</body>
</html>
